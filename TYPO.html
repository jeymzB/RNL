<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Romantic Passcode</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    color:#fff;
    overflow:hidden;
    background: radial-gradient(circle at top, #ff6aa2, #3b1c4a 60%, #0b0b14);
}

/* floating hearts */
body::before{
    content:"💖 💕 💗 💞 💓 💘 💝";
    position:absolute;
    font-size:28px;
    opacity:0.08;
    animation: floatHearts 12s linear infinite;
    white-space:nowrap;
}

@keyframes floatHearts{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-100vh);}
}

/* TOP BUTTONS */
.top-buttons{
    position:fixed;
    top:15px;
    left:15px;
    right:15px;
    display:flex;
    justify-content:flex-end;
    z-index:10;
}

.top-buttons button{
    padding:10px 18px;
    border:none;
    border-radius:12px;
    font-size:14px;
    cursor:pointer;
    color:white;
    background:rgba(255,105,180,0.4);
    backdrop-filter:blur(8px);
    box-shadow:0 0 10px rgba(255,105,180,0.3);
    transition:0.2s;
}

.top-buttons button:active{
    transform:scale(0.92);
}

/* container */
.container{
    width:90%;
    max-width:320px;
    text-align:center;
    background:rgba(0,0,0,0.35);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(255,105,180,0.3);
}

h2{
    margin-bottom:20px;
    color:#ffb6d5;
    text-shadow:0 0 10px rgba(255,105,180,0.6);
}

#display{
    width:100%;
    padding:15px;
    font-size:26px;
    text-align:center;
    border:none;
    border-radius:12px;
    margin-bottom:20px;
    letter-spacing:8px;
    background:rgba(255,255,255,0.1);
    color:#fff;
    outline:none;
    box-shadow:inset 0 0 10px rgba(255,105,180,0.3);
}

.keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

button.key{
    height:70px;
    font-size:22px;
    border:none;
    border-radius:15px;
    background:linear-gradient(145deg,#ff4d88,#ff99cc);
    color:#fff;
    cursor:pointer;
    box-shadow:0 0 10px rgba(255,105,180,0.4);
    transition:0.2s;
}

button.key:active{
    transform:scale(0.92);
}

.clear{
    background:linear-gradient(145deg,#ff3b3b,#ff7b7b);
}

#message{
    margin-top:15px;
    font-size:16px;
    min-height:20px;
}
</style>
</head>

<body>

<!-- TOP NAV BUTTONS (CLOSE ONLY) -->
<div class="top-buttons">
    <button onclick="goClose()">✖ Close</button>
</div>

<div class="container">
    <h2>💖 Secret Love Code 💖</h2>

    <input type="password" id="display" disabled>

    <div class="keypad">
        <button class="key" onclick="press(1)">1</button>
        <button class="key" onclick="press(2)">2</button>
        <button class="key" onclick="press(3)">3</button>
        <button class="key" onclick="press(4)">4</button>
        <button class="key" onclick="press(5)">5</button>
        <button class="key" onclick="press(6)">6</button>
        <button class="key" onclick="press(7)">7</button>
        <button class="key" onclick="press(8)">8</button>
        <button class="key" onclick="press(9)">9</button>
        <button class="clear" onclick="clearInput()">C</button>
        <button class="key" onclick="press(0)">0</button>
        <button class="key" onclick="backspace()">⌫</button>
    </div>

    <div id="message"></div>
</div>

<script>
let input = "";

function press(num){
    if(input.length < 6){
        input += num;
        updateDisplay();

        if(input.length === 6){
            setTimeout(checkPass, 200);
        }
    }
}

function updateDisplay(){
    document.getElementById("display").value = "•".repeat(input.length);
}

function clearInput(){
    input = "";
    updateDisplay();
}

function backspace(){
    input = input.slice(0, -1);
    updateDisplay();
}

function checkPass(){
    const message = document.getElementById("message");

    if(input === "091725"){
        message.style.color = "#ffb6d5";
        message.innerText = "Unlocked Love 💖✨";

        setTimeout(()=>{
            window.location.href = "galaxy.html";
        }, 800);

    }else{
        message.style.color = "#ff6b6b";
        message.innerText = "Wrong Love Code ❌";

        input = "";
        updateDisplay();
    }
}

function goClose(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
