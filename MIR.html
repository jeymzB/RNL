<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Milky Way Galaxy (Mobile Optimized)</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:#000;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#12001f,#050010,#000);
}

/* STAR BG */
.star-bg{
    position:absolute;
    width:2px;
    height:2px;
    border-radius:50%;
}

/* WORLD */
#world{
    position:absolute;
    inset:0;
    transform-origin:center;
}

/* CENTER GLOW */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:clamp(120px, 40vmin, 280px);
    height:clamp(120px, 40vmin, 280px);
    border-radius:50%;
    background:radial-gradient(circle,#fff,#ff4dff,#2b0057,transparent);
    filter:blur(10px);
    pointer-events:none;
    z-index:10;
}

/* TEXT */
.text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:clamp(18px, 5vw, 42px);
    font-weight:bold;
    text-shadow:0 0 10px #ff66ff,0 0 20px #ff00ff;
    text-align:center;
    z-index:11;
}

/* STAR IMAGES */
.star{
    position:absolute;
    width:clamp(45px, 10vw, 70px);
    height:clamp(45px, 10vw, 70px);
    border-radius:50%;
    object-fit:cover;
    border:2px solid white;
    box-shadow:0 0 15px rgba(255,255,255,0.6);
    transition:transform 0.3s ease, opacity 0.2s ease;
    cursor:pointer;
}

/* FULLSCREEN */
.star.fullscreen{
    position:fixed !important;
    top:0 !important;
    left:0 !important;
    width:100vw !important;
    height:100vh !important;
    object-fit:contain !important;
    border-radius:0 !important;
    z-index:999999 !important;
    background:#000;
}

/* NAVBAR MOBILE SAFE */
.navbar{
    position:fixed;
    bottom:calc(15px + env(safe-area-inset-bottom));
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    padding:10px 12px;
    border-radius:16px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.2);
    z-index:999999;
}

.navbar button{
    padding:8px 12px;
    border:none;
    border-radius:10px;
    color:white;
    background:rgba(255,255,255,0.1);
    font-size:14px;
}

/* prevent scroll */
html,body{
    width:100%;
    height:100%;
    overscroll-behavior:none;
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div id="world">
    <div class="center"></div>
    <div class="text">I LOVE YOU KRA ❤️</div>
</div>

<div class="navbar">
    <button onclick="goPrev()">Prev</button>
    <button onclick="goNext()">Next</button>
    <button onclick="goHome()">Close</button>
</div>

<script>

/* BACKGROUND STARS (REDUCED FOR MOBILE PERFORMANCE) */
const bg = document.getElementById("bg");

for(let i=0;i<150;i++){
    let s = document.createElement("div");
    s.className = "star-bg";

    let colors = ["#fff","#a7d8ff","#ffb3ff","#ffd6a5","#baffc9"];
    let color = colors[Math.floor(Math.random()*colors.length)];

    s.style.left = Math.random()*window.innerWidth + "px";
    s.style.top = Math.random()*window.innerHeight + "px";
    s.style.background = color;
    s.style.opacity = Math.random();

    bg.appendChild(s);
}

const world = document.getElementById("world");

let stars = [];
const total = 80; // reduced for mobile smoothness

let start = 79;
const arms = 3;

let rotation = 0;
let zoom = 1;
let focused = null;

const SAFE_RADIUS = 80;

/* CREATE GALAXY */
for(let i=0;i<total;i++){

    let img = document.createElement("img");
    img.src = `${start + i}.jpg`;
    img.className = "star";
    world.appendChild(img);

    let arm = i % arms;
    let t = i * 0.3;

    let radius = SAFE_RADIUS + t * 4;
    let armOffset = arm * (Math.PI * 2 / arms);
    let twist = t * 0.15;
    let z = (Math.random() - 0.5) * 120;

    let data = { img, t, radius, armOffset, twist, z };

    img.addEventListener("click", ()=>{

        if(focused === data){
            img.classList.remove("fullscreen");
            focused = null;
        }else{

            if(focused){
                focused.img.classList.remove("fullscreen");
            }

            focused = data;
            img.classList.add("fullscreen");
        }
    });

    stars.push(data);
}

/* ANIMATION */
function animate(){

    rotation += 0.002;

    let cx = window.innerWidth/2;
    let cy = window.innerHeight/2;

    stars.forEach(s=>{

        let angle = s.t + rotation + s.armOffset + s.twist;

        let x = Math.cos(angle) * s.radius * 3.5;
        let y = Math.sin(angle) * s.radius * 3;

        let depth = 1 - Math.abs(s.z)/200;
        let scale = 0.6 + depth;

        let img = s.img;

        if(focused === s){
            img.style.left = cx + "px";
            img.style.top = cy + "px";
            img.style.transform = "translate(-50%,-50%) scale(2.5)";
            img.style.zIndex = 99999;
        }else{
            img.style.left = (cx + x) + "px";
            img.style.top = (cy + y + s.z*0.2) + "px";
            img.style.transform = `translate(-50%,-50%) scale(${scale})`;
            img.style.opacity = depth;
        }
    });

    world.style.transform = `scale(${zoom})`;

    requestAnimationFrame(animate);
}
animate();

/* TOUCH DRAG */
let dragging = false;
let lastX = 0;

window.addEventListener("touchstart",(e)=>{
    dragging = true;
    lastX = e.touches[0].clientX;
});

window.addEventListener("touchend",()=>dragging=false);

window.addEventListener("touchmove",(e)=>{
    if(e.touches.length === 1 && dragging){
        rotation += (e.touches[0].clientX-lastX)*0.003;
        lastX = e.touches[0].clientX;
    }
});

/* PINCH ZOOM */
let lastDistance = null;

function getDistance(t){
    let dx = t[0].clientX - t[1].clientX;
    let dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
}

window.addEventListener("touchmove",(e)=>{

    if(e.touches.length === 2){

        e.preventDefault();

        let dist = getDistance(e.touches);

        if(lastDistance){
            zoom += (dist - lastDistance) * 0.004;

            zoom = Math.max(0.5, Math.min(3, zoom));
        }

        lastDistance = dist;
    }

},{passive:false});

window.addEventListener("touchend",()=>lastDistance=null);

/* NAV */
function goPrev(){ window.location.href = "ML.html"; }
function goNext(){ window.location.href = "Woona.html"; }
function goHome(){ window.location.href = "index.html"; }

</script>

</body>
</html>
