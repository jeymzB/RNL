```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Milky Way Galaxy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:#000;
    touch-action:none;
    user-select:none;
}

.bg{
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#12001f,#050010,#000);
}

.star-bg{
    position:absolute;
    width:2px;
    height:2px;
    border-radius:50%;
}

#world{
    position:absolute;
    inset:0;
    transform-origin:center;
}

.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:40vmin;
    height:40vmin;
    border-radius:50%;
    background:radial-gradient(circle,#fff,#ff4dff,#2b0057,transparent);
    filter:blur(10px);
    z-index:10;
}

.text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#fff;
    font-size:clamp(20px,5vw,42px);
    font-weight:bold;
    text-shadow:0 0 10px #ff66ff,0 0 20px #ff00ff;
    z-index:11;
    text-align:center;
}

.star{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #fff;
    box-shadow:0 0 18px rgba(255,255,255,0.7);
    cursor:pointer;
    transition:transform .5s ease, opacity .3s ease;
}

.star.fullscreen{
    position:fixed !important;
    top:50% !important;
    left:50% !important;
    width:85vmin !important;
    height:85vmin !important;
    object-fit:contain !important;
    border-radius:20px !important;
    transform:translate(-50%,-50%) scale(1) !important;
    background:#000;
    z-index:999999 !important;
    border:none !important;
    box-shadow:0 0 60px rgba(255,255,255,0.35);
}

.navbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    padding:10px 12px;
    border-radius:16px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    z-index:999999;
}

.navbar button{
    padding:8px 12px;
    border:none;
    border-radius:10px;
    color:#fff;
    background:rgba(255,255,255,0.15);
    font-size:15px;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div id="world">
    <div class="center"></div>
    <div class="text">I LOVE YOU KRA 😍❤️</div>
</div>

<div class="navbar">
    <button onclick="zoomOut()">－</button>
    <button onclick="goPrev()">Prev</button>
    <button onclick="goNext()">Next</button>
    <button onclick="zoomIn()">＋</button>
    <button onclick="goHome()">Close</button>
</div>

<script>
const bg=document.getElementById("bg");

for(let i=0;i<150;i++){
    let s=document.createElement("div");
    s.className="star-bg";
    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.top=Math.random()*window.innerHeight+"px";
    s.style.background="#fff";
    s.style.opacity=Math.random();
    bg.appendChild(s);
}

const world=document.getElementById("world");

let stars=[];
const total=80;
let start=79;
const arms=3;

let rotation=0;
let zoom=1;
let focused=null;
const SAFE_RADIUS=80;

for(let i=0;i<total;i++){

    let img=document.createElement("img");
    img.src=`${start+i}.jpg`;
    img.className="star";
    world.appendChild(img);

    let arm=i%arms;
    let t=i*0.3;

    let radius=SAFE_RADIUS+t*4;
    let armOffset=arm*(Math.PI*2/arms);
    let twist=t*0.15;
    let z=(Math.random()-0.5)*120;

    let data={img,t,radius,armOffset,twist,z};

    img.addEventListener("click",()=>{

        if(focused===data){
            img.classList.remove("fullscreen");
            focused=null;
            return;
        }

        if(focused){
            focused.img.classList.remove("fullscreen");
        }

        focused=data;

        setTimeout(()=>{
            img.classList.add("fullscreen");
        },200);
    });

    stars.push(data);
}

function animate(){

    rotation+=0.002;

    let cx=window.innerWidth/2;
    let cy=window.innerHeight/2;

    stars.forEach(s=>{

        let angle=s.t+rotation+s.armOffset+s.twist;

        let x=Math.cos(angle)*s.radius*3.5;
        let y=Math.sin(angle)*s.radius*3;

        let depth=1-Math.abs(s.z)/200;
        let scale=0.6+depth;

        let img=s.img;

        if(focused===s){
            img.style.zIndex=99999;
        }else{
            img.style.left=(cx+x)+"px";
            img.style.top=(cy+y+s.z*0.2)+"px";
            img.style.transform=`translate(-50%,-50%) scale(${scale})`;
            img.style.opacity=depth;
        }
    });

    world.style.transform=`scale(${zoom})`;

    requestAnimationFrame(animate);
}
animate();

/* MOBILE ROTATE + PINCH ZOOM */
let dragging=false;
let startX=0;
let lastDistance=0;

function getDistance(t1,t2){
    let dx=t2.clientX-t1.clientX;
    let dy=t2.clientY-t1.clientY;
    return Math.sqrt(dx*dx+dy*dy);
}

window.addEventListener("touchstart",(e)=>{

    if(e.touches.length===1){
        dragging=true;
        startX=e.touches[0].clientX;
    }

    if(e.touches.length===2){
        dragging=false;
        lastDistance=getDistance(e.touches[0],e.touches[1]);
    }

},{passive:false});

window.addEventListener("touchmove",(e)=>{

    e.preventDefault();

    if(e.touches.length===1 && dragging){
        let x=e.touches[0].clientX;
        rotation+=(x-startX)*0.003;
        startX=x;
    }

    if(e.touches.length===2){
        let newDistance=getDistance(e.touches[0],e.touches[1]);
        let diff=newDistance-lastDistance;

        zoom+=diff*0.003;
        zoom=Math.max(0.5,Math.min(4,zoom));

        lastDistance=newDistance;
    }

},{passive:false});

window.addEventListener("touchend",()=>{
    dragging=false;
});

/* PC ZOOM */
window.addEventListener("wheel",(e)=>{
    zoom+=e.deltaY<0?0.1:-0.1;
    zoom=Math.max(0.5,Math.min(4,zoom));
});

/* BUTTON ZOOM */
function zoomIn(){
    zoom+=0.2;
    zoom=Math.min(4,zoom);
}

function zoomOut(){
    zoom-=0.2;
    zoom=Math.max(0.5,zoom);
}

/* NAVIGATION */
function goPrev(){window.location.href="ML.html";}
function goNext(){window.location.href="Woona.html";}
function goHome(){window.location.href="index.html";}
</script>

</body>
</html>
