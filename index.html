<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Birthday → Gift → Message</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
}

/* ================= BIRTHDAY ================= */
#birthdayScreen{
  position:fixed;
  inset:0;
  background:url("RNL.jpg") no-repeat center center;
  background-size:contain;
  background-color:#e4aed4;
  z-index:10;
}

.greetings{
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  color:black;
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

.start-btn{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 18px;
  background:#ff4b5c;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* ================= GIFT ================= */
.gift-screen{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgb(232, 156, 214);
  z-index:20;
}

.gift-box{
  font-size:100px;
  animation:shake 0.6s infinite;
}

@keyframes shake{
  0%{transform:rotate(0);}
  50%{transform:rotate(10deg);}
  100%{transform:rotate(-10deg);}
}

</style>
</head>

<body>

<!-- BIRTHDAY SCREEN -->
<div id="birthdayScreen">
  <div class="greetings">
    🎉 Happy Birthday Love 🎂<br>
    💗 I Love You My Psychologist 😘
  </div>
  <button class="start-btn" onclick="start()">🎁 Click Me</button>
</div>

<!-- GIFT SCREEN -->
<div class="gift-screen" id="giftScreen">
  <div class="gift-box">🎁</div>
</div>

<script>

const birthdayScreen = document.getElementById("birthdayScreen");
const giftScreen = document.getElementById("giftScreen");

function start(){
  // show gift
  giftScreen.style.display = "flex";

  // hide birthday
  birthdayScreen.style.display = "none";

  // after animation → go to Mess.html
  setTimeout(()=>{
    window.location.href = "TYPO.html";
  }, 1500);
}

</script>

</body>
</html>
