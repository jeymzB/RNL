<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Birthday → Gift → Message</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family:Arial;
  width:100vw;
  height:100vh;
}

/* ================= BIRTHDAY SCREEN ================= */
#birthdayScreen{
  position:fixed;
  inset:0;

  background:url("RNL.jpg") no-repeat center center;
  background-size:contain;

  background-color:#ffc0cb;

  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;

  text-align:center;
  z-index:10;
  padding:20px;
}

#birthdayScreen::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,192,203,0.25);
  z-index:-1;
}

@media (max-width: 768px){
  #birthdayScreen{
    background-size:contain;
    background-position:center;
    background-repeat:no-repeat;
    background-color:#ffc0cb;
  }

  #birthdayScreen::before{
    background:rgba(255,182,193,0.35);
  }
}

.greetings{
  color:black;
  font-size:clamp(16px, 4vw, 22px);
  font-weight:bold;
  margin-bottom:25px;
}

.start-btn{
  margin-bottom:40px;
  padding:12px 20px;
  font-size:16px;
  background:#ff4b5c;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
  width:70%;
  max-width:220px;
}

/* ================= GIFT SCREEN ================= */
.gift-screen{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgb(232, 156, 214);
  z-index:20;
}

.gift-box{
  font-size:clamp(80px, 20vw, 120px);
  animation:shake 0.6s infinite;
}

@keyframes shake{
  0%{transform:rotate(0);}
  50%{transform:rotate(10deg);}
  100%{transform:rotate(-10deg);}
}

/* 🎁 OPEN ANIMATION */
.gift-box.open{
  animation: openGift 0.6s ease forwards;
}

@keyframes openGift{
  0%{transform:scale(1) rotate(0);}
  50%{transform:scale(1.3) rotate(10deg);}
  100%{transform:scale(0) rotate(720deg); opacity:0;}
}

/* 🌸 PETAL */
.petal{
  position:fixed;
  top:-20px;
  left:0;
  z-index:9999;
  pointer-events:none;
  font-size:18px;
  opacity:1;
  filter: drop-shadow(0 0 6px #ff69b4);
}

/* 💖 HEART */
.heart{
  position:fixed;
  z-index:9999;
  pointer-events:none;
  font-size:20px;
  animation:floatUp 3s linear forwards;
  filter: drop-shadow(0 0 8px #ff4fa3);
}

@keyframes floatUp{
  0%{transform:translateY(0); opacity:1;}
  100%{transform:translateY(-150px); opacity:0;}
}

/* FALL ANIMATION */
@keyframes fall{
  0%{transform:translateY(0) rotate(0deg); opacity:1;}
  100%{transform:translateY(110vh) rotate(360deg); opacity:0;}
}

/* 💥 EXPLOSION */
.explode{
  position:fixed;
  z-index:99999;
  pointer-events:none;
  font-size:18px;
  animation:explodeAnim 1s ease-out forwards;
}

@keyframes explodeAnim{
  0%{
    transform:translate(0,0) scale(1);
    opacity:1;
  }
  100%{
    transform:translate(var(--x), var(--y)) scale(0.5);
    opacity:0;
  }
}

button{
  -webkit-tap-highlight-color:transparent;
}
</style>
</head>

<body>

<!-- BIRTHDAY -->
<div id="birthdayScreen">
  <div class="greetings">
    🎉 Happy Birthday Love 🎂<br>
    💗 I Love You My Psychologist 😘
  </div>

  <button class="start-btn" onclick="start()">🎁 Click Me</button>
</div>

<!-- GIFT -->
<div class="gift-screen" id="giftScreen">
  <div class="gift-box">🎁</div>
</div>

<script>

const birthdayScreen = document.getElementById("birthdayScreen");
const giftScreen = document.getElementById("giftScreen");
const giftBox = document.querySelector(".gift-box");

/* 🎁 FLOW */
function start(){

  giftScreen.style.display = "flex";
  birthdayScreen.style.display = "none";

  giftBox.classList.add("open");

  // 💖 HEART EXPLOSION FROM GIFT
  for(let i=0;i<25;i++){
    let el = document.createElement("div");
    el.classList.add("explode");
    el.innerHTML = "💖";

    document.body.appendChild(el);

    let angle = Math.random() * 2 * Math.PI;
    let distance = Math.random() * 180;

    el.style.left = "50%";
    el.style.top = "50%";

    el.style.setProperty("--x", Math.cos(angle)*distance + "px");
    el.style.setProperty("--y", Math.sin(angle)*distance + "px");

    setTimeout(()=>el.remove(),1000);
  }

  setTimeout(()=>{
    window.location.href = "TYPO.html";
  },2000);
}

/* 🌸➡💖 MID-AIR TRANSFORMATION */
function createPetal(){
  const el = document.createElement("div");
  el.classList.add("petal");
  el.innerHTML = "🌸";

  document.body.appendChild(el);

  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (14 + Math.random() * 20) + "px";

  let duration = 5000 + Math.random() * 3000;

  el.style.animation = "fall linear forwards";
  el.style.animationDuration = duration + "ms";

  // 💖 MID TRANSFORM (kalagitnaan ng bagsak)
  setTimeout(()=>{
    el.innerHTML = "💖";
    el.style.filter = "drop-shadow(0 0 8px #ff4fa3)";
  }, duration / 2);

  setTimeout(()=>{
    el.remove();
  }, duration);
}

setInterval(createPetal,120);

/* 💥 CLICK EXPLOSION (HEARTS) */
document.addEventListener("click", function(e){

  for(let i=0;i<12;i++){
    let el = document.createElement("div");
    el.classList.add("explode");
    el.innerHTML = "💖";

    document.body.appendChild(el);

    let angle = Math.random() * 2 * Math.PI;
    let distance = Math.random() * 120;

    el.style.left = e.clientX + "px";
    el.style.top = e.clientY + "px";

    el.style.setProperty("--x", Math.cos(angle)*distance + "px");
    el.style.setProperty("--y", Math.sin(angle)*distance + "px");

    setTimeout(()=>el.remove(),1000);
  }

});

</script>

</body>
</html>
