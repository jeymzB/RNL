<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Galaxy Center Click Expand</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  height:100vh;
  background:#000;
  font-family:Arial;
  touch-action:none;
}

/* BACKGROUND */
#fixedBg{
  position:fixed;
  inset:0;
  z-index:0;
}

/* TRAIL */
#trailCanvas{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  filter: blur(2px);
}

/* SHOOTING */
#shootingCanvas{
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
}

/* WORLD */
#world{
  position:fixed;
  inset:0;
  z-index:3;
}

/* CENTER */
.center{
  position:absolute;
  top:50%;
  left:50%;
  width:320px;
  height:320px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,#fff,#ff66ff,#ff1493,transparent);
  filter:blur(18px);
  box-shadow:0 0 40px #ff66ff, 0 0 120px #ff1493;
}

/* TEXT */
.text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90vw;
  text-align:center;
  color:#fff;
  font-size:clamp(18px, 5vw, 40px);
  text-shadow:0 0 10px #ff66ff;
  pointer-events:none;
  white-space:normal;
  word-break:break-word;
}

/* IMAGE */
.star{
  position:absolute;
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid white;
  box-shadow:0 0 10px rgba(255,255,255,0.2);
  transform:translate(-50%,-50%) scale(1);
  transition:transform 0.5s ease, opacity 0.5s ease;
  cursor:pointer;
}

/* FULLSCREEN */
.star.fullscreen{
  position:fixed !important;
  top:0 !important;
  left:0 !important;
  width:100vw !important;
  height:100vh !important;
  object-fit:contain !important;
  border-radius:0 !important;
  transform:none !important;
  z-index:999999 !important;
  background:#000;
  border:none !important;
  box-shadow:none !important;
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
  padding:12px 16px;
  border-radius:20px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  z-index:99999;
}

.navbar button{
  padding:10px 16px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
  background:rgba(255,255,255,0.1);
  transition:0.3s;
}

.navbar button:hover{
  transform:scale(1.1);
  background:rgba(255,255,255,0.2);
}

/* 📱 MAS ZOOM OUT PA */
@media (max-width: 600px){

  .center{
    width:180px;
    height:180px;
    filter:blur(12px);
  }

  .star{
    width:65px;
    height:65px;
  }

  .text{
    font-size:clamp(12px, 3.5vw, 20px);
    width:95vw;
  }

  .navbar{
    transform:translateX(-50%) scale(0.8);
  }

}
</style>
</head>

<body>

<div id="fixedBg"></div>

<canvas id="trailCanvas"></canvas>
<canvas id="shootingCanvas"></canvas>

<div id="world">
  <div class="center"></div>
  <div class="text">I LOVE YOU ATE RNL 😜 ❤️</div>
</div>

<div class="navbar">
  <button onclick="goPrev()">Prev</button>
  <button onclick="goNext()">Next</button>
  <button onclick="goClose()">Close</button>
</div>

<script>

/* NAV */
function goPrev(){ window.location.href="index.html"; }
function goNext(){ window.location.href="ML.html"; }
function goClose(){ window.location.href="index.html"; }

/* CANVAS */
const tc=document.getElementById("trailCanvas");
const sc=document.getElementById("shootingCanvas");
const tctx=tc.getContext("2d");
const sctx=sc.getContext("2d");

function resize(){
 tc.width=sc.width=innerWidth;
 tc.height=sc.height=innerHeight;
}
resize();

/* BACKGROUND STARS */
const fixedBg=document.getElementById("fixedBg");
const colors=["#fff","#ff66ff","#4dabff","#ffd166","#80ffdb"];

for(let i=0;i<600;i++){
 let s=document.createElement("div");
 s.style.position="absolute";
 s.style.borderRadius="50%";

 let c=colors[Math.floor(Math.random()*colors.length)];
 let size=Math.random()*2+1;

 s.style.left=Math.random()*innerWidth+"px";
 s.style.top=Math.random()*innerHeight+"px";
 s.style.width=size+"px";
 s.style.height=size+"px";
 s.style.background=c;
 s.style.boxShadow=`0 0 10px ${c}`;

 fixedBg.appendChild(s);
}

/* SHOOTING STARS */
let shots=[];
setInterval(()=>{
 shots.push({
   x:Math.random()*innerWidth,
   y:Math.random()*innerHeight/2,
   len:160,
   vx:-6,
   vy:3,
   a:1
 });
},900);

function drawShots(){
 sctx.clearRect(0,0,sc.width,sc.height);

 shots.forEach((s,i)=>{
   sctx.beginPath();
   sctx.moveTo(s.x,s.y);
   sctx.lineTo(s.x+s.len,s.y+s.len);
   sctx.strokeStyle=`rgba(255,255,255,${s.a})`;
   sctx.shadowBlur=25;
   sctx.shadowColor="#ff66ff";
   sctx.stroke();

   s.x+=s.vx;
   s.y+=s.vy;
   s.a-=0.015;

   if(s.a<=0) shots.splice(i,1);
 });
}

/* METEORS */
const total=36;
const meteors=[];
let focused=null;

for(let i=0;i<total;i++){

 let img=document.createElement("img");
 img.src=`${i+1}.jpg`;
 img.className="star";
 document.getElementById("world").appendChild(img);

 let item={
   img,
   x:innerWidth+200+i*60,
   y:-200-i*60,
   vx:-(1.2+Math.random()*1.6),
   vy:(0.6+Math.random()*1.2),
   size:0.8+Math.random()*0.5,
   trail:[]
 };

 img.onclick=()=>{

   if(focused===item){
     img.classList.remove("fullscreen");
     focused=null;
     return;
   }

   if(focused){
     focused.img.classList.remove("fullscreen");
   }

   focused=item;
   img.classList.add("fullscreen");
 };

 meteors.push(item);
}

/* ANIMATION */
function animate(){

 drawShots();
 tctx.clearRect(0,0,tc.width,tc.height);

 meteors.forEach(m=>{

   if(focused!==m){
     m.x+=m.vx;
     m.y+=m.vy;
   }

   if(m.x<-200 || m.y>innerHeight+200){
     m.x=innerWidth+200;
     m.y=-200;
     m.trail=[];
   }

   m.trail.push({x:m.x,y:m.y});
   if(m.trail.length>140) m.trail.shift();

   for(let i=0;i<m.trail.length;i++){
     let p=m.trail[i];
     let t=i/m.trail.length;

     tctx.beginPath();
     tctx.arc(p.x,p.y,1+i*0.18,0,Math.PI*2);
     tctx.fillStyle=`rgba(255,255,255,${0.85 - t})`;
     tctx.fill();
   }

   let cx=innerWidth/2;
   let cy=innerHeight/2;

   if(focused===m){
     m.x += (cx - m.x)*0.08;
     m.y += (cy - m.y)*0.08;

     m.img.style.left=m.x+"px";
     m.img.style.top=m.y+"px";
     m.img.style.transform=`translate(-50%,-50%) scale(4)`;

   }else{
     m.img.style.left=m.x+"px";
     m.img.style.top=m.y+"px";
     m.img.style.transform=`translate(-50%,-50%) scale(${m.size})`;
   }

 });

 requestAnimationFrame(animate);
}

animate();
addEventListener("resize",resize);

</script>

</body>
</html>
