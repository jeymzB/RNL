<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Orbit Gallery 37-78</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:#000;
    touch-action:none;
    font-family:Arial;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#12001f,#050010,#000);
}

/* STAR BG */
.star-bg{
    position:absolute;
    width:2px;
    height:2px;
    border-radius:50%;
}

/* WORLD */
#world{
    position:absolute;
    inset:0;
}

/* CENTER */
.center{
    position:absolute;
    top:50%;
    left:50%;
    width:340px;
    height:340px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle,#fff,#ff4dff,#2b0057,transparent);
    filter:blur(18px);
}

/* TEXT */
.text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 0 10px #ff66ff,0 0 20px #ff00ff;
}

/* IMAGE */
.star{
    position:absolute;
    width:75px;
    height:75px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid white;
    box-shadow:0 0 18px rgba(255,255,255,0.8);
    transition:transform 0.3s ease, left 0.3s ease, top 0.3s ease, opacity 0.3s ease;
    cursor:pointer;
}

/* ⭐ FULLSCREEN FIX (BUONG IMAGE, NO CROP, NO CIRCLE) */
.star.fullscreen{
    position:fixed !important;
    top:0 !important;
    left:0 !important;
    width:100vw !important;
    height:100vh !important;

    object-fit:contain !important;

    border-radius:0 !important;
    transform:none !important;

    background:#000;
    z-index:999999 !important;

    border:none !important;
    box-shadow:none !important;
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  padding:12px 16px;
  border-radius:22px;
  background:rgba(0,0,0,0.25);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.15);
  z-index:9999;
}

.navbar button{
  padding:12px 18px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:white;
  font-weight:bold;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.25);
  transition: all 0.3s ease;
}

.navbar button:hover{
  transform:translateY(-4px) scale(1.06);
}

.next-btn{ border-color:#ff66ff; }
.prev-btn{ border-color:#4dabff; }
.close-btn{ border-color:#ff4d6d; }

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div id="world">
    <div class="center"></div>
    <div class="text">I LOVE YOU PAIN 😏❤️</div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <button class="prev-btn" onclick="goPrev()">Previous</button>
  <button class="next-btn" onclick="goNext()">Next</button>
  <button class="close-btn" onclick="goClose()">Close</button>
</div>

<script>

/* NAVIGATION */
function goNext(){
    window.location.href = "MIR.html";
}

function goPrev(){
    window.location.href = "galaxy.html";
}

function goClose(){
    window.location.href = "index.html";
}

/* BACKGROUND STARS */
const bg=document.getElementById("bg");

for(let i=0;i<400;i++){
    const s=document.createElement("div");
    s.className="star-bg";

    const colors=["#fff","#a7d8ff","#ffb3ff","#ffd6a5","#baffc9","#ff6961","#ffe66d"];
    const c=colors[Math.floor(Math.random()*colors.length)];

    s.style.left=Math.random()*innerWidth+"px";
    s.style.top=Math.random()*innerHeight+"px";
    s.style.background=c;
    s.style.boxShadow=`0 0 6px ${c}`;
    s.style.opacity=Math.random();

    bg.appendChild(s);
}

const world=document.getElementById("world");

/* IMAGE RANGE */
const start = 37;
const end = 78;
const total = end - start + 1;

/* ORBIT SETTINGS */
const radiusX=360;
const radiusY=220;

let rotation=0;
let zoom=1;
let focused=null;

let stars=[];

/* CREATE STARS */
for(let i=0;i<total;i++){

    const img=document.createElement("img");
    img.src = `${start + i}.jpg`;
    img.className="star";
    world.appendChild(img);

    let angle=(i/total)*Math.PI*2;

    const data={img,angle};

    /* ⭐ FULLSCREEN CLICK FIX */
    img.addEventListener("click",()=>{

        if(focused===data){
            img.classList.remove("fullscreen");
            focused=null;
        }else{

            if(focused){
                focused.img.classList.remove("fullscreen");
            }

            focused=data;
            img.classList.add("fullscreen");
        }

    });

    stars.push(data);
}

/* ANIMATION */
function animate(){

    rotation+=0.0022;

    const cx=innerWidth/2;
    const cy=innerHeight/2;

    stars.forEach(s=>{

        let a=s.angle+rotation;

        let x=Math.cos(a)*radiusX;
        let y=Math.sin(a)*radiusY;

        let depth=(Math.sin(a)+1)/2;
        let scale=0.55 + depth*0.7;

        let img=s.img;

        if(focused===s){

            img.style.left=cx+"px";
            img.style.top=cy+"px";
            img.style.transform="translate(-50%,-50%) scale(3)";
            img.style.zIndex=99999;
            img.style.opacity=1;

        }else{

            img.style.left=(cx+x)+"px";
            img.style.top=(cy+y)+"px";
            img.style.transform=`translate(-50%,-50%) scale(${scale})`;
            img.style.opacity=0.45 + depth*0.55;
            img.style.zIndex=Math.floor(depth*10);
        }
    });

    world.style.transform=`scale(${zoom})`;

    requestAnimationFrame(animate);
}
animate();

/* DRAG */
let dragging=false;
let lastX=0;

addEventListener("mousedown",e=>{
    dragging=true;
    lastX=e.clientX;
});

addEventListener("mouseup",()=>dragging=false);

addEventListener("mousemove",e=>{
    if(!dragging)return;
    rotation+=(e.clientX-lastX)*0.005;
    lastX=e.clientX;
});

/* TOUCH */
addEventListener("touchstart",e=>{
    dragging=true;
    lastX=e.touches[0].clientX;
});

addEventListener("touchmove",e=>{
    if(!dragging)return;
    rotation+=(e.touches[0].clientX-lastX)*0.005;
    lastX=e.touches[0].clientX;
});

addEventListener("touchend",()=>dragging=false);

/* ZOOM */
addEventListener("wheel",e=>{
    e.preventDefault();

    zoom+=e.deltaY<0?0.1:-0.1;

    if(zoom<0.4) zoom=0.4;
    if(zoom>4) zoom=4;

},{passive:false});

</script>

</body>
</html>
