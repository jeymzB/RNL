<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clean Orbit Gallery 37-78 (Mobile Fixed)</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:#000;
    touch-action:none;
    font-family:Arial;
    position:fixed;
    width:100%;
}

/* BACKGROUND */
.bg{
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#12001f,#050010,#000);
}

.star-bg{
    position:absolute;
    width:2px;
    height:2px;
    border-radius:50%;
}

#world{
    position:absolute;
    inset:0;
}

.center{
    position:absolute;
    top:50%;
    left:50%;
    width:340px;
    height:340px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle,#fff,#ff4dff,#2b0057,transparent);
    filter:blur(18px);
}

.text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:clamp(18px,4vw,40px);
    font-weight:bold;
    text-shadow:0 0 10px #ff66ff,0 0 20px #ff00ff;
    text-align:center;
}

.star{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid white;
    box-shadow:0 0 18px rgba(255,255,255,0.8);
    transition:transform 0.2s ease, left 0.2s ease, top 0.2s ease, opacity 0.2s ease;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
}

.star.fullscreen{
    position:fixed !important;
    top:0 !important;
    left:0 !important;
    width:100vw !important;
    height:100vh !important;
    object-fit:contain !important;
    border-radius:0 !important;
    transform:none !important;
    background:#000;
    z-index:999999 !important;
    border:none !important;
    box-shadow:none !important;
}

.navbar{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:20px;
  background:rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.15);
  z-index:9999;
  max-width:95%;
}

.navbar button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
  font-weight:bold;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.25);
  font-size:12px;
}

.next-btn{ border-color:#ff66ff; }
.prev-btn{ border-color:#4dabff; }
.close-btn{ border-color:#ff4d6d; }

</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div id="world">
    <div class="center"></div>
    <div class="text">I LOVE YOU PAIN ❤️</div>
</div>

<div class="navbar">
  <button class="prev-btn" onclick="goPrev()">Previous</button>
  <button class="next-btn" onclick="goNext()">Next</button>
  <button class="close-btn" onclick="goClose()">Close</button>
</div>

<script>
function goNext(){ window.location.href="MIR.html"; }
function goPrev(){ window.location.href="galaxy.html"; }
function goClose(){ window.location.href="index.html"; }

const bg=document.getElementById("bg");

for(let i=0;i<200;i++){
    const s=document.createElement("div");
    s.className="star-bg";
    const colors=["#fff","#a7d8ff","#ffb3ff","#ffd6a5"];
    const c=colors[Math.floor(Math.random()*colors.length)];
    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.top=Math.random()*window.innerHeight+"px";
    s.style.background=c;
    s.style.opacity=Math.random();
    bg.appendChild(s);
}

const world=document.getElementById("world");
const start=37;
const end=78;
const total=end-start+1;

let radiusX=window.innerWidth*0.35;
let radiusY=window.innerHeight*0.25;

let rotation=0;
let zoom=1;
let focused=null;
let stars=[];

function updateRadius(){
    radiusX=window.innerWidth*0.35;
    radiusY=window.innerHeight*0.25;
}

window.addEventListener("resize",updateRadius);
updateRadius();

for(let i=0;i<total;i++){
    const img=document.createElement("img");
    img.src=`${start+i}.jpg`;
    img.className="star";
    world.appendChild(img);

    let angle=(i/total)*Math.PI*2;
    const data={img,angle};

    img.addEventListener("click",()=>{
        if(focused===data){
            img.classList.remove("fullscreen");
            focused=null;
        }else{
            if(focused) focused.img.classList.remove("fullscreen");
            focused=data;
            img.classList.add("fullscreen");
        }
    });

    stars.push(data);
}

function animate(){
    rotation+=0.002;
    const cx=window.innerWidth/2;
    const cy=window.innerHeight/2;

    stars.forEach(s=>{
        let a=s.angle+rotation;
        let x=Math.cos(a)*radiusX;
        let y=Math.sin(a)*radiusY;
        let depth=(Math.sin(a)+1)/2;
        let scale=0.5+depth*0.8;

        let img=s.img;

        if(focused===s){
            img.style.left=cx+"px";
            img.style.top=cy+"px";
            img.style.transform="translate(-50%,-50%) scale(2.5)";
            img.style.zIndex=99999;
            img.style.opacity=1;
        }else{
            img.style.left=(cx+x)+"px";
            img.style.top=(cy+y)+"px";
            img.style.transform=`translate(-50%,-50%) scale(${scale})`;
            img.style.opacity=0.4+depth*0.6;
            img.style.zIndex=Math.floor(depth*10);
        }
    });

    world.style.transform=`scale(${zoom})`;
    requestAnimationFrame(animate);
}
animate();

let dragging=false;
let lastX=0;

function startDrag(x){ dragging=true; lastX=x; }
function moveDrag(x){ if(!dragging) return; rotation+=(x-lastX)*0.005; lastX=x; }
function endDrag(){ dragging=false; }

document.addEventListener("mousedown",e=>startDrag(e.clientX));
document.addEventListener("mousemove",e=>moveDrag(e.clientX));
document.addEventListener("mouseup",endDrag);

document.addEventListener("touchstart",e=>startDrag(e.touches[0].clientX));
document.addEventListener("touchmove",e=>moveDrag(e.touches[0].clientX));
document.addEventListener("touchend",endDrag);

document.addEventListener("wheel",e=>{
    zoom+=e.deltaY<0?0.1:-0.1;
    zoom=Math.max(0.4,Math.min(4,zoom));
},{passive:false});

</script>
</body>
</html>
