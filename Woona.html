<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Galaxy Love Mobile</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle,#02010a,#000);
  font-family:Arial;
  touch-action:none;
}

/* TITLE */
h1{
  position:absolute;
  top:18px;
  width:100%;
  text-align:center;
  font-size:22px;
  color:#ffb6e6;
  text-shadow:0 0 15px #ff4fc3,0 0 30px #ff4fc3;
  z-index:20;
  pointer-events:none;
}

/* NAV */
.navbar{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:18px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  z-index:9999;
}

.navbar button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
  background:rgba(255,255,255,0.1);
}

/* IMAGES */
.star{
  position:absolute;
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #fff;
  box-shadow:0 0 10px pink;
  z-index:10;
}

/* FULLSCREEN FIX */
.star:fullscreen {
  width:100vw !important;
  height:100vh !important;
  object-fit:contain !important;
  background:black !important;
  border:none !important;
  box-shadow:none !important;
}
</style>
</head>

<body>

<h1>I LOVE YOU LOVE LOVE 😘 💗</h1>

<div class="navbar">
  <button onclick="goPrev()">Prev</button>
  <button onclick="goNext()">Next</button>
  <button onclick="goClose()">Close</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

/* NAV */
function goNext(){ window.location.href="Mess.html"; }
function goPrev(){ window.location.href="MIR.html"; }
function goClose(){ window.location.href="index.html"; }

const isMobile=/iPhone|Android/i.test(navigator.userAgent);

/* SCENE */
const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,3,10);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.enableZoom=false;

/* GALAXY */
const count=isMobile?6000:12000;
const pos=new Float32Array(count*3);
const col=new Float32Array(count*3);

const c1=new THREE.Color("#ff4fd8");
const c2=new THREE.Color("#4da6ff");

for(let i=0;i<count;i++){
  let i3=i*3;
  let r=Math.random()*6;
  let a=(i%4)/4*Math.PI*2;
  let spin=r*1.8;

  pos[i3]=Math.cos(a+spin)*r;
  pos[i3+1]=(Math.random()-0.5)*0.5;
  pos[i3+2]=Math.sin(a+spin)*r;

  let mix=c1.clone().lerp(c2,r/6);
  col[i3]=mix.r;
  col[i3+1]=mix.g;
  col[i3+2]=mix.b;
}

const geo=new THREE.BufferGeometry();
geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
geo.setAttribute("color",new THREE.BufferAttribute(col,3));

const mat=new THREE.PointsMaterial({
  size:isMobile?0.06:0.04,
  vertexColors:true,
  transparent:true,
  blending:THREE.AdditiveBlending
});

scene.add(new THREE.Points(geo,mat));

/* CORE */
const core=new THREE.Mesh(
  new THREE.SphereGeometry(1.2,32,32),
  new THREE.MeshBasicMaterial({color:"#ff2fbf",transparent:true,opacity:0.6})
);
scene.add(core);

/* ⭐ STARS */
const stars=[];
function createStar(){
  const canvas=document.createElement("canvas");
  canvas.width=64;
  canvas.height=64;
  const ctx=canvas.getContext("2d");
  ctx.font="40px Arial";
  ctx.fillText("✨",10,45);

  const tex=new THREE.CanvasTexture(canvas);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));

  s.position.set(
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200
  );

  let size=Math.random()*1.5+0.5;
  s.scale.set(size,size,size);

  scene.add(s);
  stars.push(s);
}
for(let i=0;i<800;i++) createStar();

/* 💖 HEARTS */
const hearts=[];
function createHeart(){
  const canvas=document.createElement("canvas");
  canvas.width=64;
  canvas.height=64;
  const ctx=canvas.getContext("2d");
  ctx.font="40px Arial";
  ctx.fillText("💖",10,45);

  const tex=new THREE.CanvasTexture(canvas);
  const h=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));

  h.position.set(
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200
  );

  let size=Math.random()*2+1;
  h.scale.set(size,size,size);

  scene.add(h);
  hearts.push(h);
}
for(let i=0;i<200;i++) createHeart();

/* 🌷 TULIP BOUQUET */
const tulipBouquet=new THREE.Group();
scene.add(tulipBouquet);

function createTulip(){
  const canvas=document.createElement("canvas");
  canvas.width=128;
  canvas.height=128;
  const ctx=canvas.getContext("2d");
  ctx.font="80px Arial";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("🌷",64,64);

  const tex=new THREE.CanvasTexture(canvas);

  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
  s.scale.set(2,2,2);

  return s;
}

for(let i=0;i<18;i++){
  const t=createTulip();
  let a=(i/18)*Math.PI*2;
  let r=0.8+Math.random()*0.4;

  t.position.set(Math.cos(a)*r,Math.random()*1.2,Math.sin(a)*r);
  tulipBouquet.add(t);
}

/* IMAGES */
const start=208,end=257;
const pics=[];

function load(img,i){
  const f=[".jpg",".png",".jpeg"];
  let x=0;
  function tryLoad(){
    if(x>=f.length) return;
    img.src=i+f[x];
    x++;
  }
  img.onerror=tryLoad;
  tryLoad();
}

for(let i=start;i<=end;i++){
  const img=document.createElement("img");
  img.className="star";
  document.body.appendChild(img);
  load(img,i);
  pics.push(img);

  /* FULLSCREEN FIXED */
  img.onclick=async()=>{
    try{
      if(!document.fullscreenElement){
        await img.requestFullscreen();

        img.style.position="fixed";
        img.style.top="0";
        img.style.left="0";
        img.style.width="100vw";
        img.style.height="100vh";
        img.style.objectFit="contain";
        img.style.background="black";
        img.style.zIndex="999999";
        img.style.border="none";
        img.style.boxShadow="none";
      }else{
        await document.exitFullscreen();

        img.style.width="55px";
        img.style.height="55px";
        img.style.position="absolute";
        img.style.border="2px solid #fff";
        img.style.boxShadow="0 0 10px pink";
      }
    }catch(e){}
  };
}

/* SCREEN */
function toScreen(v){
  let p=v.clone().project(camera);
  return{
    x:(p.x*0.5+0.5)*innerWidth,
    y:(-p.y*0.5+0.5)*innerHeight,
    z:p.z
  };
}

/* SPIRAL */
function update(){
  const arms=4;
  const t=Date.now()*0.00006;

  for(let i=0;i<pics.length;i++){
    let img=pics[i];
    if(document.fullscreenElement===img) continue;

    let tt=i/pics.length;
    let a=(i%arms)/arms*Math.PI*2;
    let r=1+tt*6;

    let ang=a+tt*6+t;

    let x=Math.cos(ang)*r;
    let z=Math.sin(ang)*r;

    let s=toScreen(new THREE.Vector3(x,0,z));

    img.style.left=(s.x-28)+"px";
    img.style.top=(s.y-28)+"px";
    img.style.transform=`scale(${Math.max(0.6,1-s.z)})`;
  }
}

/* ANIMATE */
function animate(){
  requestAnimationFrame(animate);

  core.scale.setScalar(1+Math.sin(Date.now()*0.002)*0.2);

  tulipBouquet.position.y=Math.sin(Date.now()*0.001)*0.3;
  tulipBouquet.rotation.y+=0.005;

  stars.forEach(s=>s.rotation.z+=0.01);
  hearts.forEach(h=>h.rotation.y+=0.008);

  controls.update();
  update();
  renderer.render(scene,camera);
}

animate();

/* RESIZE */
window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
