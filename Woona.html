<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Love - Fixed Spiral Arms</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle,#02010a,#000);
  font-family:Arial;
}

h1{
  position:absolute;
  top:30px;
  width:100%;
  text-align:center;
  font-size:34px;
  color:#ffb6e6;
  text-shadow:0 0 20px #ff4fc3,0 0 40px #ff4fc3;
  z-index:20;
  pointer-events:none;
}

/* IMAGES */
.star{
  position:absolute;
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #fff;
  box-shadow:0 0 15px pink;
  z-index:10;
  transition:0.4s ease;
  cursor:pointer;
}

.star:fullscreen{
  width:100vw !important;
  height:100vh !important;
  object-fit:contain;
  background:black;
  border:none;
  box-shadow:none;
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  padding:12px 16px;
  border-radius:22px;
  background:rgba(0,0,0,0.25);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.15);
  z-index:9999;
}

.navbar button{
  padding:12px 18px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:white;
  font-weight:bold;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.25);
  transition:0.3s;
}

.navbar button:hover{
  transform:translateY(-4px) scale(1.06);
}

.next-btn{ border-color:#ff66ff; }
.prev-btn{ border-color:#4dabff; }
.close-btn{ border-color:#ff4d6d; }
</style>
</head>

<body>

<h1>I LOVE YOU LOVE LOVE 😘 💗</h1>

<div class="navbar">
  <button class="prev-btn" onclick="goPrev()">Previous</button>
  <button class="next-btn" onclick="goNext()">Next</button>
  <button class="close-btn" onclick="goClose()">Close</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

/* NAV */
function goNext(){ window.location.href="Mess.html"; }
function goPrev(){ window.location.href="MIR.html"; }
function goClose(){ window.location.href="index.html"; }

/* SCENE */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,3,12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.08;

/* GALAXY */
const count = 12000;
const positions = new Float32Array(count * 3);
const colors = new Float32Array(count * 3);

const colorInside = new THREE.Color("#ff4fd8");
const colorOutside = new THREE.Color("#4da6ff");

for(let i=0;i<count;i++){
  const i3 = i * 3;
  const radius = Math.random() * 6;
  const branch = i % 4;
  const angle = (branch / 4) * Math.PI * 2;
  const spin = radius * 1.8;
  const noise = (Math.random() - 0.5) * 0.4;

  positions[i3]     = Math.cos(angle + spin) * radius + noise;
  positions[i3 + 1] = (Math.random() - 0.5) * 0.6;
  positions[i3 + 2] = Math.sin(angle + spin) * radius + noise;

  const mix = colorInside.clone().lerp(colorOutside, radius / 6);

  colors[i3] = mix.r;
  colors[i3 + 1] = mix.g;
  colors[i3 + 2] = mix.b;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute("position", new THREE.BufferAttribute(positions,3));
geometry.setAttribute("color", new THREE.BufferAttribute(colors,3));

const material = new THREE.PointsMaterial({
  size:0.04,
  vertexColors:true,
  transparent:true,
  blending:THREE.AdditiveBlending,
  depthWrite:false
});

scene.add(new THREE.Points(geometry,material));

/* CORE */
const core = new THREE.Mesh(
  new THREE.SphereGeometry(1.2,32,32),
  new THREE.MeshBasicMaterial({
    color:"#ff2fbf",
    transparent:true,
    opacity:0.6
  })
);

scene.add(core);


/* 🌷 TULIPS (ADDED ONLY - NO REMOVAL) */
const tulips = [];

function createTulip(color, angle, radius){
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;

  const ctx = canvas.getContext("2d");
  ctx.font = "80px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = color;
  ctx.fillText("🌷", 64, 64);

  const texture = new THREE.CanvasTexture(canvas);

  const sprite = new THREE.Sprite(
    new THREE.SpriteMaterial({
      map:texture,
      transparent:true
    })
  );

  sprite.position.set(
    Math.cos(angle)*radius,
    (Math.random()-0.5)*0.3,
    Math.sin(angle)*radius
  );

  sprite.scale.set(1.3,1.3,1.3);

  scene.add(sprite);
  tulips.push(sprite);
}

/* pink + blue tulips */
for(let i=0;i<14;i++){
  createTulip(
    i%2===0 ? "#ff69b4" : "#4da6ff",
    (i/14)*Math.PI*2,
    1.8
  );
}

/* STARS */
const starSprites=[];

function createStar(isForeground=false){

  const canvas=document.createElement("canvas");
  canvas.width=64;
  canvas.height=64;

  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#ff69b4";
  ctx.font="40px Arial";
  ctx.fillText("✨",10,45);

  const texture=new THREE.CanvasTexture(canvas);

  const sprite=new THREE.Sprite(
    new THREE.SpriteMaterial({
      map:texture,
      transparent:true,
      color:0xff69b4
    })
  );

  const depth=isForeground
    ? Math.random()*150-50
    : Math.random()*500-250;

  sprite.position.set(
    (Math.random()-0.5)*300,
    (Math.random()-0.5)*300,
    depth
  );

  let size=isForeground
    ? Math.random()*1.5+1.5
    : Math.max(0.3,2-Math.abs(depth)/250);

  sprite.scale.set(size,size,size);

  sprite.userData={
    baseScale:size,
    speed:Math.random()*0.02+0.01
  };

  scene.add(sprite);
  starSprites.push(sprite);
}

for(let i=0;i<2200;i++) createStar(false);
for(let i=0;i<1200;i++) createStar(true);

/* HEARTS */
function createHeart(){
  const canvas=document.createElement("canvas");
  canvas.width=64;
  canvas.height=64;

  const ctx=canvas.getContext("2d");
  ctx.font="40px Arial";
  ctx.fillText("💖",10,40);

  const texture=new THREE.CanvasTexture(canvas);

  const sprite=new THREE.Sprite(
    new THREE.SpriteMaterial({
      map:texture,
      transparent:true,
      color:0xff69b4
    })
  );

  sprite.position.set(
    (Math.random()-0.5)*300,
    (Math.random()-0.5)*300,
    (Math.random()-0.5)*300
  );

  let size=Math.random()*2+2;
  sprite.scale.set(size,size,size);

  scene.add(sprite);
}

for(let i=0;i<250;i++) createHeart();

/* IMAGES */
const start=208;
const end=257;
const pics=[];

function loadImage(img,i){
  const formats=[".jpg",".jpeg",".png"];
  let index=0;

  function tryLoad(){
    if(index>=formats.length) return;
    img.src=i+formats[index];
    index++;
  }

  img.onerror=tryLoad;
  tryLoad();
}

for(let i=start;i<=end;i++){
  const img=document.createElement("img");
  img.className="star";
  document.body.appendChild(img);

  loadImage(img,i);
  pics.push(img);

  img.onclick = async () => {
    if (!document.fullscreenElement) {
      await img.requestFullscreen();
    } else {
      await document.exitFullscreen();
    }
  };
}

/* SCREEN CONVERT */
function toScreen(v){
  let p=v.clone().project(camera);
  return{
    x:(p.x*0.5+0.5)*innerWidth,
    y:(-p.y*0.5+0.5)*innerHeight,
    z:p.z
  };
}

/* FIXED SPIRAL ARM SYSTEM */
function updatePics(){

  const arms = 4;
  const maxRadius = 6;
  const time = Date.now()*0.00008;

  for(let i=0;i<pics.length;i++){

    let img = pics[i];

    if(document.fullscreenElement === img) continue;

    let t = i / pics.length;
    let armAngle = (i % arms) / arms * Math.PI * 2;

    let spiral = t * 6.5;
    let r = 1 + t * maxRadius;

    let angle = armAngle + spiral + time;

    let x = Math.cos(angle) * r;
    let y = (Math.random() - 0.5) * 0.15;
    let z = Math.sin(angle) * r;

    let screen = toScreen(new THREE.Vector3(x,y,z));

    let scale = Math.max(0.5,(1-screen.z)*0.9);

    img.style.position="absolute";
    img.style.left=(screen.x-35)+"px";
    img.style.top=(screen.y-35)+"px";
    img.style.width="70px";
    img.style.height="70px";
    img.style.transform=`scale(${scale})`;
    img.style.zIndex=1;
  }
}

/* ANIMATE */
function animate(){
  requestAnimationFrame(animate);

  const time = Date.now()*0.002;

  starSprites.forEach(s=>{
    let scale = s.userData.baseScale +
      Math.sin(time*s.userData.speed*50)*0.3;
    s.scale.set(scale,scale,scale);
  });

  core.scale.setScalar(1 + Math.sin(Date.now()*0.002)*0.2);

  /* 🌷 tulip gentle rotation */
  tulips.forEach(t=>{
    t.rotation.y += 0.01;
  });

  controls.update();
  updatePics();
  renderer.render(scene,camera);
}

animate();

/* RESIZE */
window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
